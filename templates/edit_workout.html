{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">Edit Workout</h2>
        
        <form method="POST" action="{{ url_for('edit_workout', id=workout.id) }}">
            
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" class="form-control" value="{{ workout.date.strftime('%Y-%m-%d') if workout.date else '' }}">
            </div>

            <div class="form-group">
                <label for="exercise_name">Exercise Name</label>
                <input type="text" id="exercise_name" name="exercise_name" class="form-control" required value="{{ workout.exercise_name }}">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label for="sets">Sets</label>
                    <input type="number" id="sets" name="sets" class="form-control" required min="1" value="{{ workout.sets }}">
                </div>
                
                <div class="form-group">
                    <label for="reps">Reps</label>
                    <input type="number" id="reps" name="reps" class="form-control" required min="1" value="{{ workout.reps }}">
                </div>
                
                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" step="0.1" id="weight" name="weight" class="form-control" required min="0" value="{{ workout.weight }}">
                </div>
            </div>

            <div class="form-group">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" class="form-control" rows="3">{{ workout.notes or '' }}</textarea>
            </div>

            <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end; gap: 1rem;">
                <a href="{{ url_for('history') }}" class="btn" style="background: transparent; color: var(--text-secondary);">Cancel</a>
                <button type="submit" class="btn btn-primary">Update Workout</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
